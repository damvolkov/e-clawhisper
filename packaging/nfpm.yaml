# nfpm configuration — builds .deb package for e-heed
# https://nfpm.goreleaser.com/configuration/

name: e-heed
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
release: "1"
maintainer: "Eager <dev@eager.dev>"
description: "Always-on voice daemon: wake-word → STT → Agent → TTS"
vendor: "Eager"
homepage: "https://github.com/eager-dev/e-heed"
license: "MIT"
section: sound
priority: optional

depends:
  - libportaudio2
  - libasound2

recommends:
  - pulseaudio | pipewire-pulse
  - alsa-utils
  - docker-ce | docker.io

contents:
  # Application — venv (self-contained Python + all deps)
  - src: ../dist/.staging/.venv/
    dst: /opt/e-heed/.venv/
    type: tree

  # Application — source code
  - src: ../src/e_heed/
    dst: /opt/e-heed/src/e_heed/
    type: tree

  # Models — ONNX (VAD + wakeword)
  - src: ../models/
    dst: /opt/e-heed/models/
    type: tree

  # Infrastructure — compose file for STT/TTS services
  - src: ../compose.infra.yml
    dst: /opt/e-heed/compose.infra.yml

  # CLI wrapper
  - src: ./bin/eheed
    dst: /usr/bin/eheed
    file_info:
      mode: 0755

  # Configuration (survives upgrades)
  - src: ./config.yaml
    dst: /etc/e-heed/config.yaml
    type: config|noreplace

  # Default environment file
  - src: ./env.default
    dst: /etc/e-heed/.env
    type: config|noreplace

  # Systemd user service (global user unit — available to all users)
  - src: ./systemd/e-heed.service
    dst: /usr/lib/systemd/user/e-heed.service

scripts:
  preinstall: ./scripts/preinstall.sh
  postinstall: ./scripts/postinstall.sh
  preremove: ./scripts/preremove.sh
  postremove: ./scripts/postremove.sh
