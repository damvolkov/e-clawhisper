language: es

agent:
  name: damien
  backend: generic

sentinel:
  energy_floor: 0.01
  vad_threshold: 0.5
  wakeword:
    model: alexa
    threshold: 0.5

vad:
  threshold: 0.5
  silence_duration: 1.5
  min_recording_time: 1.0

backends:
  openfang:
    host: 127.0.0.1
    port: 4200
    timeout: 30.0
  generic:
    host: localhost
    port: 45100
    api_key: ""
    timeout: 60.0

stt:
  backend: whisperlive
  whisperlive:
    host: localhost
    port: 45120
    model: large-v3-turbo

tts:
  backend: kokoro
  kokoro:
    host: localhost
    port: 45130
    voice: em_alex
    sample_rate: 24000

audio:
  sample_rate: 16000
  channels: 1
  chunk_size: 512

logging:
  idle_interval: 0.25
  turn_interval: 0.25
