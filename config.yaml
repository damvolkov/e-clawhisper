language: es

agent:
  name: damien
  backend: generic  # openfang | generic

sentinel:
  energy_floor: 0.01
  vad_threshold: 0.5
  wakeword:
    model: alexa
    threshold: 0.5

vad:
  threshold: 0.5
  silence_duration: 1.5
  min_recording_time: 1.0

conversation:
  enabled: true
  loop_timeout: 2.0
  max_turns: 10

backends:
  openfang:
    url: http://127.0.0.1:4200
    timeout: 30.0
  generic:
    provider: gemini  # gemini | openai | anthropic | vllm
    model: gemini-2.0-flash
    timeout: 60.0
    url: http://localhost:45100  # vllm only

stt:
  backend: evoice  # evoice | whisperlive
  evoice:
    url: http://localhost:45140
    language: es
  whisperlive:
    url: ws://localhost:45120
    model: large-v3-turbo

tts:
  backend: evoice  # evoice | kokoro | piper
  evoice:
    url: http://localhost:45140
    voice: af_heart
    speed: 1.0
    lang: en-us
    sample_rate: 24000
  kokoro:
    url: http://localhost:45130
    voice: em_alex
    sample_rate: 24000

audio:
  sample_rate: 16000
  channels: 1
  chunk_size: 512

logging:
  idle_interval: 0.25
  turn_interval: 0.25
