services:

  stt:
    image: ghcr.io/collabora/whisperlive-gpu:latest
    container_name: stt
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "${STT_PORT:-45120}:9090"
    volumes:
      - ./data/stt:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - PROVIDER=cuda
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 9090)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - e-core

  tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: tts
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "${TTS_PORT:-45130}:8880"
    volumes:
      - ./data/tts:/app/voices
      - ./config/tts:/app/config
    environment:
      - OUTPUT_FORMAT=pcm
      - DEFAULT_VOICE=em_alex
      - USE_GPU=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - e-core

networks:
  e-core:
    external: true
