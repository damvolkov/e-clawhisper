services:

  stt:
    image: ghcr.io/collabora/whisperlive-gpu:latest
    container_name: clawhisper-stt
    hostname: stt
    restart: unless-stopped
    ports:
      - "${STT_PORT:-9090}:9090"
    volumes:
      - ./data/stt:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 9090)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - clawhisper

  tts:
    image: lscr.io/linuxserver/piper:latest
    container_name: clawhisper-tts
    hostname: tts
    restart: unless-stopped
    ports:
      - "${TTS_PORT:-10200}:10200"
    volumes:
      - ./data/tts:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - PIPER_VOICE=${PIPER_VOICE:-es_ES-sharvard-medium}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10200"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - clawhisper

networks:
  clawhisper:
    driver: bridge
