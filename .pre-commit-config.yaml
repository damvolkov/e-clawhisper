repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest (coverage >90%)
        entry: uv run pytest --cov=e_heed --cov-fail-under=90 --tb=short -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
